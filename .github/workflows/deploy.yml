name: Gestor Proyectos — CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       solorzano_proyectos_db
          POSTGRES_USER:     solorzano_user
          POSTGRES_PASSWORD: gestor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          SECRET_KEY:             test-secret-key-for-ci-only
          DEBUG:                  True
          ALLOWED_HOSTS:          localhost,127.0.0.1
          DB_NAME:                solorzano_proyectos_db
          DB_USER:                solorzano_user
          DB_PASSWORD:            gestor
          DB_HOST:                localhost
          DB_PORT:                5432
          TEST_DB_NAME:           solorzano_proyectos_test_db
          CORS_ALLOW_ALL_ORIGINS: True
        run: uv run python manage.py test proyectos --verbosity=2

  deploy:
    name: Deploy to Azure VM
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Deploy to VM
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_ed25519 \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
              "set -e && \
               export PATH=\"\$HOME/.local/bin:/usr/local/bin:\$PATH\" && \
               cd ${{ secrets.DEPLOY_PATH }} && \
               git fetch origin && \
               git reset --hard origin/main && \
               uv sync --frozen && \
               uv run python manage.py migrate --noinput && \
               uv run python manage.py collectstatic --noinput --clear && \
               sudo systemctl restart gunicorn-solorzano_proyectos && \
               sudo systemctl restart nginx && \
               echo Despliegue completado"d